name: auto-build-wrapper
on:
  workflow_dispatch: {}
  schedule:
    - cron: "15 */6 * * *" # every 6 hours

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest OpenClaw release tag
        id: ver
        run: |
          TAG=$(curl -fsSL https://api.github.com/repos/openclaw/openclaw/releases/latest | python -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest upstream tag: $TAG"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./DockerCLI
          file: ./DockerCLI/Dockerfile
          push: true
          build-args: |
            OPENCLAW_TAG=${{ steps.ver.outputs.tag }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/openclaw-gateway-dockercli:${{ steps.ver.outputs.tag }}
